<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>malume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: #0a0a0a;
  font-family: 'Inter', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* ─── STARS CANVAS ─── */
#stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ─── PAGE LAYOUT ─── */
.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* ─── OUTER CARD ─── */
.card {
  width: 100%;
  max-width: 460px;
  background: rgba(15, 15, 15, 0.92);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 32px 28px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
  backdrop-filter: blur(12px);
  /* white neon border glow - default */
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06),
    0 0 30px rgba(255,255,255,0.04),
    0 20px 60px rgba(0,0,0,0.6);
  transition: box-shadow 1.2s ease, border-color 1.2s ease;
  animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ─── VIEW COUNT ─── */
.view-count {
  position: absolute;
  top: 14px;
  left: 18px;
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.72rem;
  color: rgba(255,255,255,0.35);
  font-weight: 400;
  letter-spacing: 0.02em;
}

.view-count svg {
  width: 13px; height: 13px;
  fill: rgba(255,255,255,0.3);
}

/* ─── AVATAR ─── */
.avatar-wrap {
  position: relative;
  width: 88px;
  height: 88px;
  margin-bottom: 14px;
  margin-top: 8px;
}

.avatar-img {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: #1c1c1c;
  border: 2px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  font-size: 2rem;
  position: relative;
  z-index: 1;
  /* white ring glow default */
  box-shadow: 0 0 0 2px rgba(255,255,255,0.08), 0 0 16px rgba(255,255,255,0.06);
  transition: box-shadow 1.2s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.avatar-img img { width: 100%; height: 100%; object-fit: cover; }

.avatar-ring {
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.15);
  /* subtle rotating white arc */
  background: conic-gradient(from 0deg, transparent 70%, rgba(255,255,255,0.5) 100%, transparent);
  animation: spinRing 5s linear infinite;
  transition: opacity 0.6s ease;
}

@keyframes spinRing {
  to { transform: rotate(360deg); }
}

/* ─── NAME ─── */
.name-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 6px;
}

.name {
  font-size: 1.55rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: #ffffff;
  text-shadow: 0 0 20px rgba(255,255,255,0.15);
  transition: color 1.2s ease, text-shadow 1.2s ease;
}

.verified-badge {
  width: 20px; height: 20px;
  background: rgba(255,255,255,0.9);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem;
  color: #0a0a0a;
  font-weight: 700;
  flex-shrink: 0;
  box-shadow: 0 0 10px rgba(255,255,255,0.3);
  transition: box-shadow 1.2s ease;
}

/* ─── TAGLINE ─── */
.tagline {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.38);
  letter-spacing: 0.04em;
  font-weight: 400;
  margin-bottom: 18px;
}

/* ─── DIVIDER ─── */
.divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.08);
  margin: 0 0 18px;
}

/* ─── SOCIAL BUTTONS ─── */
.socials {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.social-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  /* smooth scale on hover */
  transition:
    transform 0.4s cubic-bezier(0.34,1.56,0.64,1),
    background 1.2s ease,
    border-color 1.2s ease,
    box-shadow 1.2s ease;
}

.social-btn svg {
  width: 16px; height: 16px;
  fill: rgba(255,255,255,0.55);
  transition: fill 1.2s ease;
  position: relative; z-index: 1;
}

.social-btn:hover {
  transform: scale(1.12);
}

/* ─── WIDGET BOXES ─── */
.widget {
  width: 100%;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 14px 16px;
  transition:
    border-color 1.2s ease,
    box-shadow 1.2s ease,
    transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.widget + .widget {
  margin-top: 10px;
}

.widget:hover {
  transform: scale(1.015);
}

/* ─── DISCORD PRESENCE WIDGET ─── */
.presence {
  display: flex;
  align-items: center;
  gap: 12px;
}

.presence-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: #222;
  flex-shrink: 0;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  position: relative;
}

.presence-avatar img { width: 100%; height: 100%; object-fit: cover; }

.online-dot {
  position: absolute;
  bottom: 1px; right: 1px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #23a55a;
  border: 2px solid #111;
}

.presence-info { flex: 1; min-width: 0; }

.presence-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: #fff;
  display: flex; align-items: center; gap: 5px;
  margin-bottom: 2px;
}

.presence-name svg {
  width: 13px; height: 13px;
  fill: #5865F2;
  flex-shrink: 0;
}

.presence-status {
  font-size: 0.68rem;
  color: rgba(255,255,255,0.38);
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.add-discord-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 6px 12px;
  font-size: 0.7rem;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
  transition:
    border-color 1.2s ease,
    color 1.2s ease,
    box-shadow 1.2s ease,
    transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

.add-discord-btn:hover {
  transform: scale(1.06);
}

.add-discord-btn svg {
  width: 10px; height: 10px;
  fill: currentColor;
}

/* ─── DIVIDER INSIDE WIDGET ─── */
.widget-divider {
  width: 100%;
  height: 1px;
  background: rgba(255,255,255,0.06);
  margin: 12px 0;
}

/* ─── SPOTIFY TRACK ROW ─── */
.track-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.track-art {
  width: 46px; height: 46px;
  border-radius: 8px;
  background: #1a1a1a;
  flex-shrink: 0;
  overflow: hidden;
}

.track-art img { width: 100%; height: 100%; object-fit: cover; }

.track-info { flex: 1; min-width: 0; }

.track-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 1px;
}

.track-sub {
  font-size: 0.66rem;
  color: rgba(255,255,255,0.38);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 8px;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 4px;
}

.progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.7);
  border-radius: 99px;
  width: 0%;
  transition: width 1s linear, background 1.2s ease;
}

.progress-times {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.28);
}

/* ─── MUSIC PLAYER WIDGET ─── */
.player-widget {
  display: flex;
  align-items: center;
  gap: 12px;
}

.player-icon {
  color: rgba(255,255,255,0.5);
  flex-shrink: 0;
  transition: color 1.2s ease;
}

.player-icon svg { width: 16px; height: 16px; fill: currentColor; }

.player-track {
  flex: 1;
  font-size: 0.78rem;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

.player-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

.ctrl-btn {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
}

.ctrl-btn:hover { transform: scale(1.18); background: rgba(255,255,255,0.1); }

.ctrl-btn svg { width: 10px; height: 10px; fill: rgba(255,255,255,0.7); }

.ctrl-btn.play-btn {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.2);
}

.ctrl-btn.play-btn svg { width: 12px; height: 12px; fill: #fff; }

/* player progress row */
.player-progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

.player-time {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.3);
  flex-shrink: 0;
  min-width: 28px;
}

.player-time.right { text-align: right; }

/* ─── IDLE STATE ─── */
.idle-text {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.2);
  text-align: center;
  padding: 4px 0;
}

/* ════════════════════════════════════════
   RGB HOVER — smooth JS-driven transitions
   All handled via CSS custom properties +
   JS that transitions them on mouseenter/leave
════════════════════════════════════════ */

/* Hoverable elements get --rgb-opacity & --rgb-hue injected by JS */
.rgb-hover {
  --h: 0;
  --s: 100%;
  --l: 60%;
  --op: 0;
}

</style>
</head>

<script>
/* ══════════════════════════════════════════
   STARS — twinkling, slow drift
══════════════════════════════════════════ */
(function () {
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H;
  let stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.3 + Math.random() * 1.1,
      // twinkle phase
      phase: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.006 + Math.random() * 0.012,
      // very slow drift
      vx: (Math.random() - 0.5) * 0.04,
      vy: (Math.random() - 0.5) * 0.04,
      baseAlpha: 0.3 + Math.random() * 0.55,
    };
  }

  function init() {
    resize();
    stars = Array.from({ length: 220 }, mkStar);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const t = performance.now() * 0.001;
    stars.forEach(s => {
      s.phase += s.twinkleSpeed;
      s.x += s.vx;
      s.y += s.vy;
      // wrap around
      if (s.x < -2) s.x = W + 2;
      if (s.x > W + 2) s.x = -2;
      if (s.y < -2) s.y = H + 2;
      if (s.y = -2) s.y = H + 2;

      const alpha = s.baseAlpha * ((Math.sin(s.phase) + 1) / 2 * 0.7 + 0.3);
      // occasional brighter "sparkle" stars
      const isSpark = s.baseAlpha > 0.75;

      if (isSpark) {
        // draw a small 4-point cross sparkle
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = s.r * 0.5;
        ctx.beginPath();
        ctx.moveTo(s.x - s.r * 2, s.y);
        ctx.lineTo(s.x + s.r * 2, s.y);
        ctx.moveTo(s.x, s.y - s.r * 2);
        ctx.lineTo(s.x, s.y + s.r * 2);
        ctx.stroke();
        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  init();
  draw();
})();

/* ══════════════════════════════════════════
   RGB ON HOVER — smooth, CSS-transition based
   - White by default
   - On mouseenter: start cycling hue with JS,
     applying via element style (color/box-shadow etc)
     with long CSS transitions so it flows in smoothly
   - On mouseleave: transition back to white smoothly
══════════════════════════════════════════ */

// Cycle speed in ms per full rotation
const RGB_CYCLE_MS = 3000;

// Track active hover states
const hoverTimers = new Map();

// Map element IDs to what properties to animate
// 'text'   → color + text-shadow
// 'border' → border-color + box-shadow
// 'both'   → text + border
// 'bg'     → background tint + border
// 'icon'   → fill (via color on parent)

function hsl(h) {
  // h: 0-360
  return `hsl(${h}, 100%, 65%)`;
}

function rgbGlow(h, strength = 0.35) {
  return `hsl(${h}, 100%, 65%)`;
}

function applyRGB(el, h, type) {
  const col = hsl(h);
  const glow = `0 0 14px hsla(${h},100%,65%,0.45), 0 0 30px hsla(${h},100%,65%,0.15)`;
  const borderGlow = `0 0 12px hsla(${h},100%,65%,0.3), inset 0 0 8px hsla(${h},100%,65%,0.05)`;

  if (type === 'text') {
    el.style.color = col;
    el.style.textShadow = `0 0 12px hsla(${h},100%,65%,0.6), 0 0 28px hsla(${h},100%,65%,0.25)`;
  } else if (type === 'border') {
    el.style.borderColor = `hsla(${h},100%,65%,0.55)`;
    el.style.boxShadow = borderGlow;
  } else if (type === 'both') {
    el.style.color = col;
    el.style.textShadow = `0 0 10px hsla(${h},100%,65%,0.5)`;
    el.style.borderColor = `hsla(${h},100%,65%,0.4)`;
    el.style.boxShadow = borderGlow;
  } else if (type === 'icon') {
    el.style.color = col;
    el.style.borderColor = `hsla(${h},100%,65%,0.4)`;
    el.style.boxShadow = `0 0 10px hsla(${h},100%,65%,0.2)`;
    const svg = el.querySelector('svg');
    if (svg) svg.style.fill = col;
  } else if (type === 'card') {
    el.style.borderColor = `hsla(${h},100%,65%,0.25)`;
    el.style.boxShadow = `0 0 0 1px hsla(${h},100%,65%,0.08), 0 0 40px hsla(${h},100%,65%,0.06), 0 20px 60px rgba(0,0,0,0.6)`;
  } else if (type === 'widget') {
    el.style.borderColor = `hsla(${h},100%,65%,0.25)`;
    el.style.boxShadow = `0 0 16px hsla(${h},100%,65%,0.08)`;
  } else if (type === 'pill') {
    el.style.borderColor = `hsla(${h},100%,65%,0.4)`;
    el.style.color = col;
    el.style.boxShadow = `0 0 8px hsla(${h},100%,65%,0.15)`;
  }
}

function clearRGB(el, type) {
  // Restore white/default with transition
  el.style.transition = 'color 1s ease, text-shadow 1s ease, border-color 1s ease, box-shadow 1s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  if (type === 'text') {
    el.style.color = '#ffffff';
    el.style.textShadow = '0 0 20px rgba(255,255,255,0.15)';
  } else if (type === 'border') {
    el.style.borderColor = 'rgba(255,255,255,0.1)';
    el.style.boxShadow = '';
  } else if (type === 'both') {
    el.style.color = '#ffffff';
    el.style.textShadow = '0 0 20px rgba(255,255,255,0.12)';
    el.style.borderColor = 'rgba(255,255,255,0.08)';
    el.style.boxShadow = '';
  } else if (type === 'icon') {
    el.style.color = '';
    el.style.borderColor = 'rgba(255,255,255,0.1)';
    el.style.boxShadow = '';
    const svg = el.querySelector('svg');
    if (svg) svg.style.fill = 'rgba(255,255,255,0.55)';
  } else if (type === 'card') {
    el.style.borderColor = 'rgba(255,255,255,0.1)';
    el.style.boxShadow = '0 0 0 1px rgba(255,255,255,0.06), 0 0 30px rgba(255,255,255,0.04), 0 20px 60px rgba(0,0,0,0.6)';
  } else if (type === 'widget') {
    el.style.borderColor = 'rgba(255,255,255,0.08)';
    el.style.boxShadow = '';
  } else if (type === 'pill') {
    el.style.borderColor = 'rgba(255,255,255,0.15)';
    el.style.color = 'rgba(255,255,255,0.7)';
    el.style.boxShadow = '';
  }
}

function startRGB(el, type) {
  if (hoverTimers.has(el)) return;
  const startTime = performance.now();
  // fast initial transition into RGB
  el.style.transition = 'color 0.6s ease, text-shadow 0.6s ease, border-color 0.6s ease, box-shadow 0.6s ease, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';

  function tick(now) {
    if (!hoverTimers.has(el)) return;
    const elapsed = now - startTime;
    const h = (elapsed / RGB_CYCLE_MS * 360) % 360;
    applyRGB(el, h, type);
    hoverTimers.set(el, requestAnimationFrame(tick));
  }
  hoverTimers.set(el, requestAnimationFrame(tick));
}

function stopRGB(el, type) {
  if (hoverTimers.has(el)) {
    cancelAnimationFrame(hoverTimers.get(el));
    hoverTimers.delete(el);
  }
  clearRGB(el, type);
}

// Register elements
const rgbTargets = [
  { id: 'nameEl',       type: 'text'   },
  { id: 'badgeEl',      type: 'text'   },
  { id: 'avatarEl',     type: 'border' },
  { id: 'mainCard',     type: 'card'   },
  { id: 'btnDiscord',   type: 'icon'   },
  { id: 'btnSpotify',   type: 'icon'   },
  { id: 'btnKofi',      type: 'icon'   },
  { id: 'btnLink',      type: 'icon'   },
  { id: 'widget1',      type: 'widget' },
  { id: 'widget2',      type: 'widget' },
  { id: 'addDiscordBtn',type: 'pill'   },
];

rgbTargets.forEach(({ id, type }) => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('mouseenter', () => startRGB(el, type));
  el.addEventListener('mouseleave', () => stopRGB(el, type));
});

/* ══════════════════════════════════════════
   SCALE ON HOVER — smooth expand/contract
   Using CSS transition (set via JS so it applies everywhere)
══════════════════════════════════════════ */

// Elements that should scale up while hovered
const scaleTargets = [
  { id: 'avatarEl',      scale: 1.06 },
  { id: 'nameEl',        scale: 1.04 },
  { id: 'btnDiscord',    scale: 1.12 },
  { id: 'btnSpotify',    scale: 1.12 },
  { id: 'btnKofi',       scale: 1.12 },
  { id: 'btnLink',       scale: 1.12 },
  { id: 'widget1',       scale: 1.012 },
  { id: 'widget2',       scale: 1.012 },
  { id: 'addDiscordBtn', scale: 1.06  },
];

scaleTargets.forEach(({ id, scale }) => {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.transition = [
    'color 0.6s ease',
    'text-shadow 0.6s ease',
    'border-color 0.6s ease',
    'box-shadow 0.6s ease',
    'transform 0.35s cubic-bezier(0.25,0.46,0.45,0.94)',
    'fill 0.6s ease',
  ].join(', ');
  el.addEventListener('mouseenter', () => el.style.transform = `scale(${scale})`);
  el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');
});


/* ══════════════════════════════════════════
   SPOTIFY POLLING
══════════════════════════════════════════ */
const ENDPOINT = '/api/spotify'; // ← Set to your Cloudflare Worker URL
let progInterval = null, localProg = 0;
const fmt = ms => { const s = Math.floor(ms / 1000); return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`; };

function setIdle() {
  document.getElementById('trackRow').style.display = 'none';
  document.getElementById('spotifyDivider').style.display = 'none';
  document.getElementById('discordStatus').textContent = 'Online';
  document.getElementById('playerTrack').textContent = 'not listening right now';
  document.getElementById('playerFill').style.width = '0%';
  document.getElementById('playerElapsed').textContent = '0:00';
  document.getElementById('playerDuration').textContent = '0:00';
  clearInterval(progInterval);
}

function setPlaying(data) {
  document.getElementById('trackRow').style.display = 'flex';
  document.getElementById('spotifyDivider').style.display = 'block';
  document.getElementById('discordStatus').textContent = 'Listening to Spotify';
  document.getElementById('trackName').textContent = data.trackName;
  document.getElementById('trackSub').textContent = `by ${data.artist}${data.album ? ' · ' + data.album : ''}`;
  document.getElementById('timeDuration').textContent = fmt(data.duration);
  document.getElementById('playerTrack').textContent = `${data.artist} - ${data.trackName}`;
  document.getElementById('playerDuration').textContent = fmt(data.duration);

  const art = document.getElementById('trackArt');
  const placeholder = document.getElementById('trackArtPlaceholder');
  if (data.albumArt) {
    art.src = data.albumArt;
    art.style.display = 'block';
    placeholder.style.display = 'none';
  }

  localProg = data.progress;
  clearInterval(progInterval);
  progInterval = setInterval(() => {
    localProg += 1000;
    if (localProg > data.duration) localProg = data.duration;
    const pct = (localProg / data.duration * 100).toFixed(1) + '%';
    document.getElementById('progressFill').style.width = pct;
    document.getElementById('playerFill').style.width = pct;
    document.getElementById('timeElapsed').textContent = fmt(localProg);
    document.getElementById('playerElapsed').textContent = fmt(localProg);
  }, 1000);
}

async function poll() {
  try {
    const r = await fetch(ENDPOINT);
    if (!r.ok) throw 0;
    const d = await r.json();
    d.isPlaying ? setPlaying(d) : setIdle();
  } catch (e) { setIdle(); }
}

poll();
setInterval(poll, 30000);
</script>
