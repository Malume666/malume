<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MALUME</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='bg' cx='38%25' cy='32%25' r='62%25'%3E%3Cstop offset='0%25' stop-color='%23bb9af7'/%3E%3Cstop offset='55%25' stop-color='%237aa2f7'/%3E%3Cstop offset='100%25' stop-color='%234a6cf7'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='url(%23bg)'/%3E%3Cellipse cx='32' cy='32' rx='13' ry='30' fill='none' stroke='%23ffffff' stroke-width='2' stroke-opacity='0.55'/%3E%3Cellipse cx='32' cy='32' rx='30' ry='11' fill='none' stroke='%23ffffff' stroke-width='2' stroke-opacity='0.55'/%3E%3Cline x1='2' y1='32' x2='62' y2='32' stroke='%23ffffff' stroke-width='2' stroke-opacity='0.4'/%3E%3Cline x1='32' y1='2' x2='32' y2='62' stroke='%23ffffff' stroke-width='2' stroke-opacity='0.4'/%3E%3Ccircle cx='32' cy='32' r='30' fill='none' stroke='%23ffffff' stroke-width='2' stroke-opacity='0.9'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&family=Bebas+Neue&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #04040c;
      --surface: rgba(255,255,255,0.045);
      --border: rgba(255,255,255,0.09);
      --text: #f0f0ff;
      --muted: rgba(240,240,255,0.62);
      --blue: #7aa2f7;
      --purple: #bb9af7;
      --indigo: #9d7cd8;
      --neon-green: #39ff8f;
      --neon-purple: #c084fc;
      --neon-orange: #ffb340;
      --green: #9ece6a;
      --red: #f7768e;
      --idle: #ffa657;
      --discord: #5865F2;
      --spotify: #1DB954;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
    }

    /* Mobile — allow vertical scroll */
    @media (max-width: 768px) {
      html, body { overflow-y: auto; }
      .page { height: auto; min-height: 100vh; overflow: visible; }
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Studio grid background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(122,162,247,0.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(122,162,247,0.055) 1px, transparent 1px),
        linear-gradient(rgba(187,154,247,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(187,154,247,0.025) 1px, transparent 1px);
      background-size:
        80px 80px,
        80px 80px,
        16px 16px,
        16px 16px;
      /* fade grid out at edges so center content pops */
      -webkit-mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 100%);
      mask-image: radial-gradient(ellipse 85% 85% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
    }

    /* Ambient center glow */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 42%, rgba(122,162,247,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 45% 38% at 50% 42%, rgba(187,154,247,0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 1.5rem;
      gap: 0.75rem;
      overflow: hidden;
    }

    /* About Me corner button */
    .about-btn {
      position: fixed;
      top: 1.1rem;
      right: 1.2rem;
      z-index: 100;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.42rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(122,162,247,0.3);
      background: rgba(8,8,20,0.7);
      backdrop-filter: blur(16px);
      color: #7aa2f7;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.03em;
      text-decoration: none;
      transition: border-color .25s, box-shadow .25s, background .25s, color .25s, transform .2s;
    }
    .about-btn:hover {
      border-color: #7aa2f7;
      background: rgba(122,162,247,0.1);
      color: #a8c4ff;
      box-shadow: 0 0 14px rgba(122,162,247,0.35), 0 0 28px rgba(122,162,247,0.12);
      transform: translateY(-1px);
    }
    .about-btn svg { flex-shrink: 0; transition: filter .25s; }
    .about-btn:hover svg { filter: drop-shadow(0 0 5px rgba(122,162,247,0.8)); }

    /* ── Name ── */
    .name-wrap {
      width: 100%;
      max-width: 700px;
      display: flex;
      justify-content: center;
      padding: 0 2rem;
      overflow: hidden;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 10vw, 6.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      white-space: nowrap;
      /* White base, blue+purple sweep runs left → right → left */
      background: linear-gradient(90deg,
        #ffffff 0%,
        #ffffff 15%,
        #7aa2f7 30%,
        #bb9af7 50%,
        #7aa2f7 70%,
        #ffffff 85%,
        #ffffff 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradFlow 4s ease-in-out infinite;
      filter:
        drop-shadow(0 0 14px rgba(155,124,216,0.45))
        drop-shadow(0 0 36px rgba(122,162,247,0.18));
    }

    @keyframes gradFlow {
      0%   { background-position: 100% 50%; }  /* purple/blue on right */
      50%  { background-position: 0%   50%; }  /* purple/blue on left  */
      100% { background-position: 100% 50%; }  /* back to right        */
    }

    /* ── Bio pills ── */
    .bio {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.42rem;
      max-width: 500px;
    }

    .pill {
      font-size: 0.68rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0.01em;
      text-transform: lowercase;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(155,120,247,0.25);
      background: rgba(155,120,247,0.07);
      color: rgba(240,240,255,0.72);
      backdrop-filter: blur(8px);
      animation: fadeUp 0.5s ease both;
      transition: border-color 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .pill:hover { border-color: rgba(155,120,247,0.55); color: var(--text); box-shadow: 0 0 10px rgba(155,120,247,0.2); }
    .pill:nth-child(1){animation-delay:.04s}
    .pill:nth-child(2){animation-delay:.09s}
    .pill:nth-child(3){animation-delay:.14s}
    .pill:nth-child(4){animation-delay:.19s}
    .pill:nth-child(5){animation-delay:.24s}
    .pill:nth-child(6){animation-delay:.29s}
    .pill:nth-child(7){animation-delay:.34s}
    .pill:nth-child(8){animation-delay:.39s}

    /* ── Stat ── */
    .stat {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: #ff4d6a;
      text-shadow: 0 0 12px rgba(255,77,106,0.7), 0 0 28px rgba(255,77,106,0.3);
      font-weight: 700;
      transition: color 0.8s ease, text-shadow 0.8s ease;
    }
    .stat.final {
      color: var(--neon-green);
      text-shadow: 0 0 12px rgba(57,255,143,0.6), 0 0 28px rgba(57,255,143,0.25);
    }
    .stat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4d6a;
      box-shadow: 0 0 8px #ff4d6a, 0 0 18px rgba(255,77,106,0.6);
      animation: redFlash 0.6s ease-in-out infinite;
      transition: background 0.8s ease, box-shadow 0.8s ease, animation 0s;
      flex-shrink: 0;
    }
    .stat-dot.final {
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green), 0 0 18px rgba(57,255,143,0.5);
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes redFlash {
      0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 8px #ff4d6a, 0 0 20px rgba(255,77,106,0.7); }
      50%      { opacity: 0.25; transform: scale(0.7); box-shadow: 0 0 3px #ff4d6a; }
    }

    /* ── Buttons ── */
    .socials {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.55rem;
      width: min(560px, calc(100vw - 3rem));
    }
    .btn {
      display: flex;
      align-items: center;
      gap: 0.44rem;
      padding: 0.52rem 0.95rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.78rem;
      letter-spacing: 0.01em;
      text-decoration: none;
      white-space: nowrap;
      transition: border-color .25s, box-shadow .25s, transform .2s, background .25s, color .25s, text-shadow .25s;
      backdrop-filter: blur(12px);
    }
    .btn svg { flex-shrink: 0; transition: filter .25s; }
    .btn:hover { transform: translateY(-2px); }

    /* Discord — neon purple */
    .btn.discord {
      border-color: rgba(192,132,252,0.3);
      color: var(--neon-purple);
    }
    .btn.discord:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 18px rgba(192,132,252,0.5), 0 0 40px rgba(192,132,252,0.2), inset 0 0 12px rgba(192,132,252,0.06);
      background: rgba(192,132,252,0.08);
      color: #e0b4ff;
      text-shadow: 0 0 10px rgba(192,132,252,0.8);
    }
    .btn.discord:hover svg { filter: drop-shadow(0 0 6px rgba(192,132,252,0.9)); }

    /* Spotify — neon green */
    .btn.spotify {
      border-color: rgba(29,185,84,0.3);
      color: #1DB954;
    }
    .btn.spotify:hover {
      border-color: #1aff6e;
      box-shadow: 0 0 18px rgba(26,255,110,0.5), 0 0 40px rgba(26,255,110,0.2), inset 0 0 12px rgba(26,255,110,0.06);
      background: rgba(29,185,84,0.08);
      color: #1aff6e;
      text-shadow: 0 0 10px rgba(26,255,110,0.8);
    }
    .btn.spotify:hover svg { filter: drop-shadow(0 0 6px rgba(26,255,110,0.9)); }

    /* Time — neon orange-yellow */
    .btn.time {
      border-color: rgba(255,179,64,0.3);
      color: var(--neon-orange);
    }
    .btn.time:hover {
      border-color: #ffc844;
      box-shadow: 0 0 18px rgba(255,200,68,0.5), 0 0 40px rgba(255,200,68,0.2), inset 0 0 12px rgba(255,200,68,0.06);
      background: rgba(255,179,64,0.08);
      color: #ffd466;
      text-shadow: 0 0 10px rgba(255,200,68,0.8);
    }
    .btn.time:hover svg { filter: drop-shadow(0 0 6px rgba(255,200,68,0.9)); }

    /* R6S — neon red */
    .btn.r6s {
      border-color: rgba(255,60,60,0.3);
      color: #ff4444;
    }
    .btn.r6s:hover {
      border-color: #ff2222;
      box-shadow: 0 0 18px rgba(255,50,50,0.55), 0 0 40px rgba(255,50,50,0.2), inset 0 0 12px rgba(255,50,50,0.07);
      background: rgba(255,50,50,0.08);
      color: #ff6666;
      text-shadow: 0 0 10px rgba(255,60,60,0.9);
    }
    .btn.r6s:hover svg { filter: drop-shadow(0 0 6px rgba(255,60,60,0.9)); }

    /* Email — neon blue */
    .btn.email {
      border-color: rgba(56,189,248,0.3);
      color: #38bdf8;
    }
    .btn.email:hover {
      border-color: #22d3ee;
      box-shadow: 0 0 18px rgba(34,211,238,0.5), 0 0 40px rgba(34,211,238,0.2), inset 0 0 12px rgba(34,211,238,0.06);
      background: rgba(56,189,248,0.08);
      color: #67e8f9;
      text-shadow: 0 0 10px rgba(56,189,248,0.9);
    }
    .btn.email:hover svg { filter: drop-shadow(0 0 6px rgba(56,189,248,0.9)); }

    /* ═══════════════════════════════
       3D TILT WRAPPER
    ═══════════════════════════════ */
    .tilt-outer {
      width: min(560px, calc(100vw - 3rem));
      perspective: 800px;
    }
    .tilt-outer > * {
      width: 100%;
      transition: transform .6s cubic-bezier(0.23,1,0.32,1);
      will-change: transform;
    }
    /* Shine overlay */
    .card-shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      z-index: 50;
      opacity: 0;
    }

    /* ═══════════════════════════════
       DISCORD CARD
    ═══════════════════════════════ */
    .discord-card {
      width: 100%;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: rgba(8,8,18,0.78);
      backdrop-filter: blur(24px);
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }
    .discord-card.online  { border-color: rgba(158,206,106,.6); box-shadow: 0 0 20px rgba(158,206,106,.18), 0 0 40px rgba(158,206,106,.07); }
    .discord-card.idle    { border-color: rgba(255,166,87,.6);  box-shadow: 0 0 20px rgba(255,166,87,.18),  0 0 40px rgba(255,166,87,.07);  }
    .discord-card.dnd     { border-color: rgba(247,118,142,.6); box-shadow: 0 0 20px rgba(247,118,142,.18), 0 0 40px rgba(247,118,142,.07); }
    .discord-card.offline { border-color: rgba(255,255,255,0.15); }

    /* Banner */
    .card-banner {
      position: relative;
      height: 110px;
      overflow: visible;
      background: linear-gradient(135deg, #0e1022 0%, #1b1240 50%, #0f1535 100%);
      flex-shrink: 0;
    }
    .card-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px 14px 0 0;
      overflow: hidden;
      pointer-events: none;
    }
    #banner-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 14px 14px 0 0;
      z-index: 1;
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      border-radius: 14px 14px 0 0;
      z-index: 2;
      background: linear-gradient(180deg,
        rgba(4,4,12,0) 40%,
        rgba(4,4,12,0.5) 100%
      );
      transition: opacity .4s;
    }

    /* LIVE */
    .live-badge {
      position: absolute;
      top: 10px; right: 12px;
      display: flex; align-items: center; gap: 5px;
      font-size: .6rem; letter-spacing: .1em;
      color: var(--green);
      opacity: 0; transition: opacity .4s;
      z-index: 4;
    }
    .live-badge.on { opacity: 1; }
    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Avatar overlapping banner — sits half-out of banner bottom */
    .card-avatar-row {
      position: relative;
      height: 52px; /* half of avatar (88px / 2 = 44) + a little breathing room */
      padding: 0 18px;
    }
    .avatar-outer {
      position: absolute;
      top: -44px; /* pulls avatar up so its centre aligns with banner bottom */
      left: 18px;
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 4px solid #08080f;
      background: #111128;
      overflow: visible;
      flex-shrink: 0;
      z-index: 10;
    }
    .avatar-outer img {
      width: 100%; height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }
    .avatar-outer::after {
      content: '';
      position: absolute;
      bottom: 3px; right: 3px;
      width: 18px; height: 18px;
      border-radius: 50%;
      border: 3px solid #08080f;
      background: #4e4e50;
      transition: background .3s, box-shadow .3s;
      z-index: 3;
    }
    .discord-card.online  .avatar-outer::after { background: var(--green);  box-shadow: 0 0 8px var(--green); }
    .discord-card.idle    .avatar-outer::after { background: var(--idle);   box-shadow: 0 0 8px var(--idle);  }
    .discord-card.dnd     .avatar-outer::after { background: var(--red);    box-shadow: 0 0 8px var(--red);   }
    .discord-card.offline .avatar-outer::after { background: #4e4e50; box-shadow: none; }

    /* Card body text */
    .card-body {
      padding: 6px 18px 14px;
    }
    .card-username {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }
    .card-tag {
      font-size: .69rem;
      color: var(--muted);
      margin-top: 1px;
      margin-bottom: 8px;
    }
    .badges {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-bottom: 8px; min-height: 4px;
    }
    .badge {
      width: 22px; height: 22px;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem;
      background: var(--surface);
      border: 1px solid var(--border);
      cursor: default;
    }
    .status-text {
      font-size: .69rem;
      color: var(--muted);
    }
    .status-text b { font-weight: 700; }
    .status-text b.online  { color: var(--green); }
    .status-text b.idle    { color: var(--idle);  }
    .status-text b.dnd     { color: var(--red);   }
    .status-text b.offline { color: #6e6e70; }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 18px 14px;
      margin-top: 0;
    }
    .add-discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.36rem 0.85rem;
      border-radius: 8px;
      border: 1px solid rgba(192,132,252,0.3);
      background: rgba(192,132,252,0.06);
      color: var(--neon-purple);
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      transition: border-color .25s, box-shadow .25s, background .25s, color .25s, transform .2s;
    }
    .add-discord-btn:hover {
      border-color: var(--neon-purple);
      background: rgba(192,132,252,0.12);
      color: #e0b4ff;
      box-shadow: 0 0 12px rgba(192,132,252,0.35), 0 0 24px rgba(192,132,252,0.12);
      transform: translateX(2px);
    }

    .card-divider { height: 1px; background: var(--border); margin: 10px 0; }

    .activity { display: flex; align-items: center; gap: 11px; }
    .act-art {
      width: 50px; height: 50px;
      border-radius: 8px; object-fit: cover; flex-shrink: 0;
      background: var(--surface);
    }
    .act-art.sk {
      background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,.07) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: skSh 1.5s ease infinite;
    }
    .act-info { min-width: 0; flex: 1; }
    .act-type {
      font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--purple); margin-bottom: 2px;
    }
    .act-name {
      font-family: 'Syne', sans-serif; font-size: .84rem; font-weight: 700;
      color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .act-detail {
      font-size: .67rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }

    /* Idle / Nothing Much state */
    .act-idle {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .act-idle-icon {
      font-size: 1.6rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .act-idle-text {
      font-family: 'DM Sans', sans-serif;
      font-size: .78rem;
      color: var(--muted);
      font-style: italic;
    }

    /* Activity wrap — smooth slide-in, never pushes page */
    #activity-wrap {
      max-height: 0;
      overflow: hidden;
      transition: max-height .4s cubic-bezier(0.4,0,0.2,1);
    }
    #activity-wrap.has-activity {
      max-height: 100px;
    }

    .type-cursor {
      display: inline-block;
      color: #ff4d6a;
      font-weight: 700;
      text-shadow: 0 0 8px #ff4d6a;
      animation: blink .75s step-end infinite;
      margin-left: 1px;
      transition: color 0.8s ease, text-shadow 0.8s ease;
    }
    .type-cursor.final {
      color: var(--neon-green);
      text-shadow: 0 0 8px var(--neon-green);
    }

      0%   { background-position: 200% 0; }

    .page > * { animation: fadeUp .65s ease both; }

    .page > :nth-child(3){ animation-delay:.16s }

/* ═══════════════════════
   STARFIELD — drift + respawn
═══════════════════════ */
(function(){
  const cv  = document.getElementById('stars-canvas');
  const ctx = cv.getContext('2d');
  let W, H, stars = [];

  // hue palette: white, blue, purple
  const PALS = [
    {h:0,  s:0  }, {h:0,  s:0  }, {h:0,  s:0  }, // 60% white
    {h:225,s:80 }, {h:225,s:80 },                 // 20% blue
    {h:270,s:70 }, {h:270,s:70 },                 // 20% purple
  ];

  function resize(){
    W = cv.width  = window.innerWidth;
    H = cv.height = window.innerHeight;
  }

  function newStar(){
    const p   = PALS[Math.floor(Math.random()*PALS.length)];
    const big = Math.random() < 0.13;
    return {
      x   : Math.random()*W,
      y   : Math.random()*H,
      r   : big ? Math.random()*1.7+1.1 : Math.random()*0.85+0.1,
      a   : Math.random(),
      da  : (Math.random()*0.007+0.002)*(Math.random()<.5?1:-1),
      vx  : (Math.random()-.5)*0.08,
      vy  : (Math.random()-.5)*0.06,
      ttl : Math.floor(Math.random()*500+250), // frames to live
      age : 0,
      dying: false,
      p, big,
    };
  }

  function init(n){
    stars = [];
    for(let i=0;i<n;i++){
      const s = newStar();
      s.age = Math.floor(Math.random()*s.ttl); // stagger
      stars.push(s);
    }
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach((s,i)=>{
      s.age++;
      // flicker
      s.a += s.da;
      if(s.a<=0.04){ s.da=Math.abs(s.da); }
      if(s.a>=1   ){ s.da=-Math.abs(s.da); }
      // drift
      s.x += s.vx;
      s.y += s.vy;
      // start dying
      if(!s.dying && s.age>=s.ttl) s.dying=true;
      if(s.dying){ s.a-=0.015; if(s.a<=0){ stars[i]=newStar(); return; } }

      const alpha = Math.max(0,Math.min(1,s.a));
      const col = s.p.s>0
        ? `hsla(${s.p.h},${s.p.s}%,85%,${alpha})`
        : `rgba(255,255,255,${alpha})`;

      ctx.save();
      if(s.big){
        const g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*5.5);
        const gc = s.p.s>0 ? `hsla(${s.p.h},${s.p.s}%,85%,` : 'rgba(200,215,255,';
        g.addColorStop(0,  gc+(alpha*.65)+')');
        g.addColorStop(.38,gc+(alpha*.1)+')');
        g.addColorStop(1,  gc+'0)');
        ctx.fillStyle=g;
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r*5.5,0,Math.PI*2);
        ctx.fill();
      }
      ctx.globalAlpha=alpha;
      ctx.fillStyle=col;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }

  resize(); init(380); draw();
  window.addEventListener('resize',()=>{ resize(); init(380); });
})();

(function(){

  const wrap = el.parentElement;
  function fit(){
    el.style.fontSize='';
    const max = wrap.clientWidth - 32;
    let fs = parseFloat(getComputedStyle(el).fontSize);
    while(el.scrollWidth > max && fs > 20){
      fs -= 1;
      el.style.fontSize = fs+'px';
    }
  }
  document.fonts.ready.then(fit);
  window.addEventListener('resize', fit);
  setTimeout(fit, 400);
})();

  }

  function render(d){
    const {discord_user:u, discord_status:st, activities=[], spotify} = d;

    // avatar
    if(u.avatar){
      const ext = u.avatar.startsWith('a_')?'gif':'webp';
      avatarImg.src = `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=128`;
    }

    // banner — use Lanyard's banner_url if available, else CDN
    const bannerEl = document.querySelector('.card-banner');
    const bannerUrl = d.discord_user?.banner_color
      ? null  // banner_color means no image banner
      : null;
    if(u.banner){
      const ext = u.banner.startsWith('a_')?'gif':'webp';
      const bUrl = `https://cdn.discordapp.com/banners/${u.id}/${u.banner}.${ext}?size=480`;
      bannerImg.onload = () => {
        bannerImg.classList.add('loaded');
        bannerEl.classList.add('has-banner');
      };
      bannerImg.onerror = () => { bannerImg.classList.remove('loaded'); bannerEl.classList.remove('has-banner'); };
      bannerImg.src = bUrl;
    }

    // identity
    nameEl.textContent = u.global_name || u.username;
    tagEl.textContent  = '@'+u.username;

    // status
    card.className = 'discord-card '+st;
    statusEl.innerHTML = `Status: <b class="${st}">${SLABEL[st]||st}</b>`;

    // badges
    badgesEl.innerHTML='';
    const flags = u.public_flags||0;
    BADGES.forEach(([flag,emoji,label])=>{
      if(flags&flag){
        const el=document.createElement('span');
        el.className='badge'; el.textContent=emoji; el.title=label;
        badgesEl.appendChild(el);
      }
    });

    // activity
    actEl.innerHTML='';
    actEl.classList.remove('has-activity');

    // pull custom status (type 4) separately for display
    const customStatus = activities.find(a => a.type === 4);
    const mainAct      = activities.find(a => a.type !== 4);

    if(spotify){
      // ── Spotify ──
      const art = spotify.album_art_url || '';
      actEl.innerHTML = `
        <div class="card-divider"></div>
        <div class="activity">
          ${art ? `<img class="act-art" src="${esc(art)}" alt="album" />` : '<div class="act-art sk"></div>'}
          <div class="act-info">
            <div class="act-type">🎵 Listening on Spotify</div>
            <div class="act-name">${esc(spotify.song)}</div>
            <div class="act-detail">by ${esc(spotify.artist)}</div>
            ${spotify.album ? `<div class="act-detail" style="opacity:.6">${esc(spotify.album)}</div>` : ''}
          </div>
        </div>`;
      requestAnimationFrame(() => actEl.classList.add('has-activity'));
    } else if(mainAct){
      // ── Game / other rich activity ──
      let art = null;
      if(mainAct.assets?.large_image){
        if(mainAct.assets.large_image.startsWith('mp:external/')){
          const p = mainAct.assets.large_image.split('/');
          art = 'https://' + p.slice(2).join('/');
        } else if(mainAct.assets.large_image.startsWith('spotify:')){
          // skip, handled above
        } else {
          art = `https://cdn.discordapp.com/app-assets/${mainAct.application_id}/${mainAct.assets.large_image}.webp?size=64`;
        }
      }

      const typeLabel = mainAct.type === 0 ? '🎮 Playing'
                      : mainAct.type === 1 ? '📡 Streaming'
                      : mainAct.type === 2 ? '🎵 Listening to'
                      : mainAct.type === 3 ? '📺 Watching'
                      : '📡 Activity';

      const detail  = mainAct.details || '';
      const state   = mainAct.state   || '';
      const detailLine = [detail, state].filter(Boolean).join(' · ');

      actEl.innerHTML = `
        <div class="card-divider"></div>
        <div class="activity">
          ${art ? `<img class="act-art" src="${esc(art)}" alt="art" />` : ''}
          <div class="act-info" ${!art ? 'style="padding-left:2px"' : ''}>
            <div class="act-type">${typeLabel}</div>
            <div class="act-name">${esc(mainAct.name)}</div>
            ${detailLine ? `<div class="act-detail">${esc(detailLine)}</div>` : ''}
          </div>
        </div>`;
      requestAnimationFrame(() => actEl.classList.add('has-activity'));
    } else {
      // ── Nothing active ──
      const idleText  = customStatus?.state || 'Nothing Much';
      const idleEmoji = customStatus?.emoji?.name || '💤';
      actEl.innerHTML = `
        <div class="card-divider"></div>
        <div class="act-idle">
          <span class="act-idle-icon">${idleEmoji}</span>
          <span class="act-idle-text">${esc(idleText)}</span>
        </div>`;
      requestAnimationFrame(() => actEl.classList.add('has-activity'));
    }
  } // end render

  let hb;
  function connect(){
    const ws=new WebSocket(WSU);
    ws.onopen=()=>liveEl.classList.add('on');
    ws.onmessage=e=>{
      const m=JSON.parse(e.data);
      if(m.op===1){
        hb=setInterval(()=>ws.readyState===1&&ws.send(JSON.stringify({op:3})),m.d.heartbeat_interval);
        ws.send(JSON.stringify({op:2,d:{subscribe_to_id:ID}}));
      }
      if(m.op===0) render(m.d);
    };
    ws.onclose=()=>{
      liveEl.classList.remove('on');
      clearInterval(hb);
      card.className='discord-card offline';
      statusEl.innerHTML='Status: <b class="offline">Reconnecting…</b>';
      setTimeout(connect,5000);
    };
    ws.onerror=()=>ws.close();
  }
  connect();
})();

/* ═══════════════════════
   TYPING VISIT COUNTER
═══════════════════════ */
(function(){
  const el     = document.getElementById('visit-count');
  const statEl = el ? el.closest('.stat') : null;
  const dotEl  = document.getElementById('stat-dot');
  const cursor = document.querySelector('.type-cursor');
  if(!el) return;

  const MILESTONES = [
    '100,000 Visits',
    '500,000 Visits',
    '1M Visits',
    '5M Visits',
    '20M Visits',
    '50M Visits',
    '100M+ Visits',
  ];

  const TYPE_SPEED   = 55;
  const DELETE_SPEED = 30;
  const PAUSE_AFTER  = 1400;

  let mIdx = 0, charIdx = 0, deleting = false;

  function goGreen(){
    if(statEl) statEl.classList.add('final');
    if(dotEl)  dotEl.classList.add('final');
    if(cursor) cursor.classList.add('final');
  }

  function tick(){
    const word    = MILESTONES[mIdx];
    const isFinal = mIdx === MILESTONES.length - 1;

    if(!deleting){
      charIdx++;
      el.textContent = word.slice(0, charIdx);

      if(charIdx === word.length){
        if(isFinal){ goGreen(); return; }
        setTimeout(()=>{ deleting=true; tick(); }, PAUSE_AFTER);
        return;
      }
    } else {
      charIdx--;
      el.textContent = word.slice(0, charIdx);
      if(charIdx === 0){
        deleting = false;
        mIdx++;
        setTimeout(tick, 180);
        return;
      }
    }

    setTimeout(tick, deleting ? DELETE_SPEED : TYPE_SPEED);
  }

  setTimeout(tick, 900);
})();

/* ═══════════════════════
   AUDIO PLAYER — no Web Audio (CORS-safe)
═══════════════════════ */
(function(){
  const player   = document.getElementById('audio-player');
  const audio    = document.getElementById('audio-el');
  const playBtn  = document.getElementById('play-btn');
  const playIcon = document.getElementById('play-icon');
  const slider   = document.getElementById('track-slider');
  const timeCur  = document.getElementById('time-cur');
  const timeDur  = document.getElementById('time-dur');
  const muteBtn  = document.getElementById('mute-btn');
  const volIcon  = document.getElementById('vol-icon');
  const vizCv    = document.getElementById('viz-canvas');
  const barsRow  = document.getElementById('bars-row');
  const vizCtx   = vizCv.getContext('2d');

  // ── Build CSS bars ──
  const BAR_COUNT = 40;
  const barEls = [];
  for(let i = 0; i < BAR_COUNT; i++){
    const b = document.createElement('div');
    b.className = 'bar';
    const lo  = (Math.random() * 0.08 + 0.14).toFixed(2);
    const hi  = (Math.random() * 0.45 + 0.55).toFixed(2);
    const spd = (Math.random() * 0.9 + 0.6).toFixed(2);
    const dly = (Math.random() * 0.5).toFixed(2);
    b.style.setProperty('--lo',  lo);
    b.style.setProperty('--hi',  hi);
    b.style.setProperty('--spd', spd + 's');
    b.style.setProperty('--dly', dly + 's');
    barsRow.appendChild(b);
    barEls.push(b);
  }

  // ── Helpers ──
  function fmt(s){
    if(isNaN(s)||!isFinite(s)) return '0:00';
    return Math.floor(s/60)+':'+(Math.floor(s%60)).toString().padStart(2,'0');
  }
  function updateFill(){
    const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
    slider.style.background = `linear-gradient(to right,#7aa2f7 ${pct}%,rgba(255,255,255,0.1) ${pct}%)`;
  }

  // ── Size canvases ──
  function sizeCanvases(){
    const topEl = vizCv.parentElement;
    vizCv.width  = topEl.offsetWidth  * devicePixelRatio;
    vizCv.height = topEl.offsetHeight * devicePixelRatio;
  }
  window.addEventListener('resize', sizeCanvases);
  setTimeout(sizeCanvases, 150);

  // ── State ──
  let isPlaying = false;
  let t = 0;
  let cardScale = 1;

  const PLAY_PATH  = '<polygon points="5,3 19,12 5,21"/>';
  const PAUSE_PATH = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

  function setPlaying(p){
    isPlaying = p;
    playIcon.innerHTML = p ? PAUSE_PATH : PLAY_PATH;
    player.classList.toggle('playing', p);
  }

  // ── Main loop ──
  function drawFrame(){
    requestAnimationFrame(drawFrame);
    t++;

    drawVizIdle();

    // Card breath — gentle sine pulse while playing, applied to tilt wrapper scale
    const tiltPlayer = document.getElementById('tilt-player');
    if(isPlaying){
      const pulse = Math.sin(t * 0.04) * 0.5 + 0.5;
      const target = 1 + pulse * 0.012;
      cardScale += (target - cardScale) * 0.08;
    } else {
      cardScale += (1 - cardScale) * 0.08;
    }
    if(tiltPlayer) tiltPlayer.style.transform = `scale(${cardScale.toFixed(4)})`;
  }

  // Idle canvas — subtle shimmer when playing, clear when not
  function drawVizIdle(){
    const W = vizCv.width, H = vizCv.height;
    vizCtx.clearRect(0,0,W,H);
    if(!isPlaying) return;

    const bins = 64;
    const barW = W / bins;
    for(let i=0; i<bins; i++){
      // Pseudo-frequency: different sine waves per bar
      const phase = i * 0.38 + t * 0.055;
      const v = (Math.sin(phase) * 0.5 + 0.5) *
                (Math.sin(i * 0.22 + t * 0.03) * 0.3 + 0.7);
      const bH = v * H * 0.75;
      const hue = 220 + v * 60;
      const g = vizCtx.createLinearGradient(0, H-bH, 0, H);
      g.addColorStop(0, `hsla(${hue},90%,75%,${0.08 + v*0.55})`);
      g.addColorStop(1, `hsla(${hue+30},85%,60%,0.02)`);
      vizCtx.fillStyle = g;
      const gap = barW * 0.28;
      vizCtx.beginPath();
      if(vizCtx.roundRect) vizCtx.roundRect(i*barW+gap/2, H-bH, barW-gap, bH, [2,2,0,0]);
      else vizCtx.rect(i*barW+gap/2, H-bH, barW-gap, bH);
      vizCtx.fill();
    }
  }

  // ── Controls ──
  playBtn.addEventListener('click', ()=>{
    audio.paused ? audio.play().catch(e => console.warn(e)) : audio.pause();
  });

  // Autoplay on first interaction anywhere on the page
  let autoplayed = false;
  function tryAutoplay(){
    if(autoplayed) return;
    autoplayed = true;
    audio.play().catch(()=>{});
  }
  document.addEventListener('click',     tryAutoplay, { once: true });
  document.addEventListener('touchstart',tryAutoplay, { once: true, passive: true });
  document.addEventListener('keydown',   tryAutoplay, { once: true });
  // Also try immediately (works if browser allows it, e.g. returning visitor)
  audio.play().catch(()=>{});
  audio.addEventListener('play',  ()=> setPlaying(true));
  audio.addEventListener('pause', ()=> setPlaying(false));
  audio.addEventListener('ended', ()=> setPlaying(false));
  audio.addEventListener('loadedmetadata', onMeta);
  // If audio is already cached and metadata already loaded (refresh), fire immediately
  if(audio.readyState >= 1) onMeta();

  function onMeta(){
    timeDur.textContent = fmt(audio.duration);
    slider.max = audio.duration;
    updateFill();
  }
  audio.addEventListener('timeupdate', ()=>{
    timeCur.textContent = fmt(audio.currentTime);
    if(!slider.dragging){ slider.value = audio.currentTime; updateFill(); }
  });
  slider.addEventListener('mousedown',  ()=> slider.dragging = true);
  slider.addEventListener('touchstart', ()=> slider.dragging = true, {passive:true});
  slider.addEventListener('input',  ()=>{ timeCur.textContent=fmt(+slider.value); updateFill(); });
  slider.addEventListener('change', ()=>{ audio.currentTime=+slider.value; slider.dragging=false; updateFill(); });
  slider.addEventListener('mouseup', ()=>{ slider.dragging=false; audio.currentTime=+slider.value; updateFill(); });

  const SOUND_PATH='<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>';
  const MUTE_PATH ='<path d="M16.5 12A4.5 4.5 0 0 0 14 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  muteBtn.addEventListener('click',()=>{
    audio.muted = !audio.muted;
    muteBtn.classList.toggle('muted', audio.muted);
    volIcon.innerHTML = audio.muted ? MUTE_PATH : SOUND_PATH;
  });

  updateFill();
  drawFrame();
})();

/* ═══════════════════════
   3D CARD TILT
═══════════════════════ */
(function(){
  const MAX = 7;

  [
    { wrap: document.getElementById('tilt-discord'), card: document.getElementById('discord-card') },
    { wrap: document.getElementById('tilt-player'),  card: document.getElementById('audio-player') },
  ].forEach(({ wrap, card }) => {
    if(!wrap || !card) return;

    // shine overlay lives inside the card
    const shine = document.createElement('div');
    shine.className = 'card-shine';
    card.appendChild(shine);

    let tx = 0, ty = 0;
    let cx = 0, cy = 0;
    let raf = null;
    let over = false;

    function tick(){
      cx += (tx - cx) * (over ? 0.14 : 0.08);
      cy += (ty - cy) * (over ? 0.14 : 0.08);

      // Direct style.transform on the card — no CSS vars, no conflicts
      card.style.transform = `rotateX(${cy.toFixed(3)}deg) rotateY(${cx.toFixed(3)}deg)`;

      const mag = Math.sqrt(cx*cx + cy*cy) / MAX;
      shine.style.opacity  = (over ? mag * 0.15 : 0).toFixed(3);
      const shx = 50 + (cx / MAX) * 40;
      const shy = 50 - (cy / MAX) * 40;
      shine.style.background = `radial-gradient(circle at ${shx.toFixed(1)}% ${shy.toFixed(1)}%, rgba(255,255,255,0.2) 0%, transparent 55%)`;

      const settled = Math.abs(tx-cx)<0.02 && Math.abs(ty-cy)<0.02;
      if(!over && settled){
        card.style.transform = '';
        shine.style.opacity  = 0;
        raf = null;
      } else {
        raf = requestAnimationFrame(tick);
      }
    }

    // Events on the WRAPPER (so pointer hits the full area)
    wrap.addEventListener('mousemove', e => {
      const r  = wrap.getBoundingClientRect();
      const nx = ((e.clientX - r.left)  / r.width  - 0.5) * 2; // -1..1, left = -1, right = 1
      const ny = ((e.clientY - r.top)   / r.height - 0.5) * 2; // -1..1, top  = -1, bottom = 1
      tx =  nx * MAX;   // right side  → tilt right  (rotateY +)
      ty = -ny * MAX;   // top side    → tilt up     (rotateX +)
      if(!raf) raf = requestAnimationFrame(tick);
    });

    wrap.addEventListener('mouseenter', () => {
      over = true;
      card.style.transition = 'border-color .3s, box-shadow .3s';
      if(!raf) raf = requestAnimationFrame(tick);
    });

    wrap.addEventListener('mouseleave', () => {
      over = false;
      tx = 0; ty = 0;
      card.style.transition = 'border-color .3s, box-shadow .3s, transform .7s cubic-bezier(0.23,1,0.32,1)';
      if(!raf) raf = requestAnimationFrame(tick);
    });
  });
})();
</script>
